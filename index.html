<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STGV Pro - విశ్వ నేత్ర & కాలజ్ఞానం 3D</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <style>
        :root { --neon: #00d2ff; --warn: #ff4500; --space: #00050a; }
        body { margin: 0; background: var(--space); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .page { position: absolute; width: 100%; height: 100%; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }
        
        /* విశ్వ నేత్ర UI */
        .header { padding: 15px; text-align: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid var(--neon); box-shadow: 0 4px 15px rgba(0,210,255,0.3); }
        #v-wrap { position: relative; flex: 1; border: 2px solid var(--neon); margin: 12px; border-radius: 25px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scanner-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--neon); animation: scan 3s linear infinite; box-shadow: 0 0 15px var(--neon); }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* భవిష్యవాణి UI & 3D Avatar */
        #p2 { background: radial-gradient(circle at center, #001a33 0%, #000 100%); align-items: center; justify-content: center; text-align: center; }
        #avatar-container { width: 100%; height: 350px; position: relative; margin-top: 20px; }
        .sun-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #ff4500, transparent); filter: blur(30px); opacity: 0.6; z-index: 0; }
        
        .card { width: 85%; margin-top: 10px; padding: 20px; border: 1px solid var(--neon); border-radius: 25px; background: rgba(0,210,255,0.05); backdrop-filter: blur(10px); min-height: 120px; z-index: 1; }
        .btn { border: 2px solid var(--neon); color: var(--neon); padding: 12px 35px; border-radius: 30px; background: none; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; z-index: 1; }
        .btn:hover { background: var(--neon); color: black; }
    </style>
</head>
<body onclick="initApp()">

    <div id="p1" class="page">
        <div class="header">
            <h2 style="margin:0; color:var(--neon); text-shadow: 0 0 10px var(--neon);">STGV విశ్వ నేత్ర Pro</h2>
            <div id="ai-status" style="font-size: 0.8em;">తాకి ప్రారంభించండి</div>
        </div>
        <div id="v-wrap">
            <video id="cam" autoplay playsinline muted></video>
            <div class="scanner-line"></div>
        </div>
        <div class="header" style="border-top: 2px solid var(--neon); border-bottom: none;">
            <div id="obj-label" style="color:var(--neon); font-weight: bold; margin-bottom: 10px;">గమనిస్తున్నాను...</div>
            <button class="btn" onclick="toFuture()">నేరుగా భవిష్యవాణి</button>
        </div>
    </div>

    <div id="p2" class="page hidden">
        <h1 style="color:var(--neon); text-shadow: 0 0 20px var(--neon); margin: 5px;">STGV భవిష్యవాణి</h1>
        <div id="avatar-container" onclick="getFuture()">
            <div class="sun-bg"></div>
            </div>
        <div class="card">
            <div id="f-msg" style="font-size: 1.1em; line-height: 1.6;">రోబోట్‌ను తాకి నేటి కాలజ్ఞానం విను...</div>
        </div>
        <button class="btn" onclick="location.reload()">మళ్ళీ మొదటికి</button>
    </div>

    <script>
        let model, video, synth = window.speechSynthesis, active = false;
        let scene, camera, renderer, character, mixer, clock, mouthMesh, is3DInitialized = false;

        async function initApp() {
            if(active) return; active = true;
            video = document.getElementById('cam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                document.getElementById('ai-status').innerText = "ఇంజిన్ లోడ్ అవుతోంది...";
                model = await cocoSsd.load();
                document.getElementById('ai-status').innerText = "విశ్వ నేత్ర సిద్ధం";
                speak("విశ్వ నేత్ర ప్రో సిద్ధం.");
                process();
            } catch(e) { alert("కెమెరా పర్మిషన్ ఇవ్వండి"); }
        }

        async function process() {
            if(!document.getElementById('p2').classList.contains('hidden')) return;
            const res = await model.detect(video);
            if(res.length > 0) {
                let itm = res[0];
                let tel = itm.class === 'person' ? "మనిషి" : itm.class;
                document.getElementById('obj-label').innerText = tel + " కనిపిస్తోంది";
                speak(tel);
            }
            setTimeout(process, 5000); 
        }

        // --- Three.js Logic ---
        function init3D() {
            if (is3DInitialized) return;
            is3DInitialized = true;
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / 350, 0.1, 1000);
            camera.position.set(0, 1.4, 3);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, 350);
            document.getElementById('avatar-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            let dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            const loader = new THREE.GLTFLoader();
            // Robot Model with Morph Targets (Lip Sync)
            const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/RobotExpressive/glTF-Binary/RobotExpressive.glb';

            loader.load(modelUrl, (gltf) => {
                character = gltf.scene;
                character.scale.set(0.4, 0.4, 0.4);
                character.position.y = 0;
                scene.add(character);

                mixer = new THREE.AnimationMixer(character);
                const idle = THREE.AnimationClip.findByName(gltf.animations, 'Idle');
                if (idle) mixer.clipAction(idle).play();

                character.traverse(child => {
                    if (child.morphTargetInfluences && child.name === 'Head_2') {
                        mouthMesh = child;
                    }
                });
            });

            function animate() {
                requestAnimationFrame(animate);
                if (mixer) mixer.update(clock.getDelta());
                renderer.render(scene, camera);
            }
            animate();
        }

        function toFuture() { 
            document.getElementById('p1').classList.add('hidden'); 
            document.getElementById('p2').classList.remove('hidden'); 
            init3D();
            speak("కాల చక్రంలోకి స్వాగతం. మీ నేటి కాలాన్ని తెలుసుకోండి.", true);
        }

        function getFuture() {
            const msgs = ["నీ సంకల్పం గొప్పది. విజయం నీదే.", "కాలం నీ వెంటే ఉంది. ముందడుగు వేయి.", "నేడు నీకు ఒక శుభవార్త అందుతుంది."];
            let msg = msgs[Math.floor(Math.random()*msgs.length)];
            document.getElementById('f-msg').innerText = msg;
            speak(msg, true);
        }

        function speak(t, g=false) {
            let u = new SpeechSynthesisUtterance(t); 
            u.lang = 'te-IN'; u.pitch = g ? 0.3 : 0.9; u.rate = 0.85;

            u.onstart = () => {
                const sync = () => {
                    if (synth.speaking && mouthMesh) {
                        // 'MouthOpen' is usually index 0 in this model
                        mouthMesh.morphTargetInfluences[0] = Math.abs(Math.sin(Date.now() * 0.015)) * 0.8;
                        requestAnimationFrame(sync);
                    } else if (mouthMesh) {
                        mouthMesh.morphTargetInfluences[0] = 0;
                    }
                };
                sync();
            };

            synth.cancel(); synth.speak(u);
        }
    </script>
</body>
</html>
